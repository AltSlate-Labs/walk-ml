<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EEF7F1"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto-start-reverse">
      <path d="M0 0 L12 6 L0 12 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" rx="28" fill="url(#bg)"/>

  <text x="600" y="56" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="34" font-weight="700" fill="#0F172A">
    walk-ml architecture
  </text>
  <text x="600" y="84" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="16" fill="#334155">
    Walking sequence capture -> keypoint-like data points -> training and evaluation
  </text>

  <rect x="70" y="130" width="330" height="260" rx="20" fill="url(#cardA)" filter="url(#shadow)"/>
  <text x="235" y="168" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="white">
    1) Capture Walking Clips
  </text>
  <text x="235" y="194" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#E0F2FE">
    camera_id | session_id | timestamp
  </text>

  <line x1="178" y1="230" x2="178" y2="302" stroke="#E0F2FE" stroke-width="4"/>
  <circle cx="178" cy="216" r="12" fill="none" stroke="#E0F2FE" stroke-width="4"/>
  <line x1="178" y1="244" x2="152" y2="272" stroke="#E0F2FE" stroke-width="4"/>
  <line x1="178" y1="244" x2="202" y2="262" stroke="#E0F2FE" stroke-width="4"/>
  <line x1="178" y1="302" x2="152" y2="338" stroke="#E0F2FE" stroke-width="4"/>
  <line x1="178" y1="302" x2="204" y2="336" stroke="#E0F2FE" stroke-width="4"/>

  <line x1="288" y1="230" x2="288" y2="302" stroke="#E0F2FE" stroke-width="4"/>
  <circle cx="288" cy="216" r="12" fill="none" stroke="#E0F2FE" stroke-width="4"/>
  <line x1="288" y1="244" x2="260" y2="262" stroke="#E0F2FE" stroke-width="4"/>
  <line x1="288" y1="244" x2="316" y2="270" stroke="#E0F2FE" stroke-width="4"/>
  <line x1="288" y1="302" x2="262" y2="334" stroke="#E0F2FE" stroke-width="4"/>
  <line x1="288" y1="302" x2="320" y2="324" stroke="#E0F2FE" stroke-width="4"/>

  <text x="235" y="365" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="12" font-weight="700" fill="#DBEAFE">
    label: walking_samples
  </text>

  <rect x="435" y="130" width="330" height="260" rx="20" fill="url(#cardB)" filter="url(#shadow)"/>
  <text x="600" y="168" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="white">
    2) Extract Data Points
  </text>
  <text x="600" y="194" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#D1FAE5">
    clip_path -> tensors [T,H,W,C] + metadata
  </text>

  <rect x="468" y="222" width="264" height="128" rx="14" fill="#ECFDF5" fill-opacity="0.2" stroke="#A7F3D0" stroke-width="1.5"/>
  <circle cx="500" cy="250" r="5" fill="#A7F3D0"/>
  <circle cx="525" cy="264" r="5" fill="#A7F3D0"/>
  <circle cx="556" cy="242" r="5" fill="#A7F3D0"/>
  <circle cx="584" cy="276" r="5" fill="#A7F3D0"/>
  <circle cx="612" cy="254" r="5" fill="#A7F3D0"/>
  <circle cx="642" cy="286" r="5" fill="#A7F3D0"/>
  <circle cx="670" cy="248" r="5" fill="#A7F3D0"/>
  <circle cx="700" cy="272" r="5" fill="#A7F3D0"/>

  <polyline points="500,318 530,300 560,306 590,286 620,292 650,268 680,260 710,238"
            fill="none" stroke="#A7F3D0" stroke-width="3"/>
  <text x="600" y="338" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="12" font-weight="700" fill="#ECFDF5">
    data points collected over frames
  </text>

  <rect x="800" y="130" width="330" height="260" rx="20" fill="url(#cardC)" filter="url(#shadow)"/>
  <text x="965" y="168" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="white">
    3) Train + Evaluate
  </text>
  <text x="965" y="194" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#FFEDD5">
    encoder embeddings -> gallery match -> metrics
  </text>

  <rect x="836" y="224" width="258" height="58" rx="10" fill="#FFF7ED" fill-opacity="0.24"/>
  <text x="965" y="248" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#FFF7ED">
    train.py: best_weights.npz
  </text>
  <text x="965" y="266" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#FFF7ED">
    val_metrics.jsonl
  </text>

  <rect x="836" y="294" width="258" height="58" rx="10" fill="#FFF7ED" fill-opacity="0.24"/>
  <text x="965" y="318" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#FFF7ED">
    test.py + evaluate.py
  </text>
  <text x="965" y="336" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#FFF7ED">
    FAR / FRR / EER + confusion matrix
  </text>

  <path d="M400 258 H426" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M765 258 H791" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="150" y="450" width="900" height="240" rx="20" fill="#0F172A" filter="url(#shadow)"/>
  <text x="600" y="490" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="700" fill="#E2E8F0">
    Data Contract and Artifact Surface
  </text>

  <text x="230" y="530" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#CBD5E1">
    index.csv fields:
  </text>
  <text x="230" y="555" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#94A3B8">
    clip_path, user_id, session_id, camera_id, timestamp, quality_score
  </text>
  <text x="230" y="590" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#CBD5E1">
    generated artifacts:
  </text>
  <text x="230" y="615" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#94A3B8">
    checkpoints/, metrics/, test_predictions.csv, evaluation_report.json
  </text>

  <rect x="740" y="522" width="230" height="122" rx="14" fill="#1E293B"/>
  <text x="855" y="548" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#E2E8F0">
    labels
  </text>
  <text x="760" y="575" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#A5F3FC">
    walking_samples
  </text>
  <text x="760" y="596" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#86EFAC">
    data_points
  </text>
  <text x="760" y="617" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#FCD34D">
    training_eval
  </text>
</svg>
